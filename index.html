<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leaderbotz bots for ff-api errors</title>
    <style>
        :root {
            --primary: #00d4ff;
            --accent: #7000ff;
            --bg: #0a0a12;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- Page 1 UI --- */
        #page1 {
            text-align: center;
            z-index: 10;
        }

        .container {
            background: rgba(20, 20, 35, 0.8);
            padding: 50px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .input-group {
            position: relative;
            margin: 25px 0;
        }

        input#uid {
            width: 280px;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-align: center;
        }

        input#uid:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
            outline: none;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        button.submit-btn {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        /* --- Loading Animation --- */
        #loader-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .custom-loader {
            width: 80px; height: 80px;
            border: 4px solid transparent;
            border-top: 4px solid var(--primary);
            border-right: 4px solid var(--accent);
            border-radius: 50%;
            animation: ringRotation 1s linear infinite;
        }

        @keyframes ringRotation { 100% { transform: rotate(360deg); } }

        /* --- Page 2 & Waves --- */
        #page2 {
            display: none;
            width: 100%; height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .wave-container {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 150px;
            display: flex; align-items: flex-end; gap: 4px;
        }

        .wave-bar {
            flex: 1;
            background: linear-gradient(to top, var(--primary), var(--accent));
            height: 20px;
            animation: bounce 0.6s ease-in-out infinite alternate;
        }

        /* --- Popups --- */
        .toast {
            position: fixed;
            top: 20px; right: -350px;
            background: #ff3e3e;
            padding: 15px 25px;
            border-radius: 8px;
            transition: 0.5s;
            z-index: 1000;
        }

        .api-modal {
            position: fixed;
            background: #151525;
            padding: 40px;
            border-top: 4px solid #ff3e3e;
            border-radius: 20px;
            text-align: center;
            z-index: 2000;
            display: none;
        }

        /* --- Floating Buttons Logic --- */
        #floating-container {
            position: fixed;
            bottom: 160px;
            right: 30px;
            display: none; /* Initially hidden */
            flex-direction: column;
            gap: 12px;
            z-index: 500;
        }

        .float-btn {
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            background: white;
            color: black;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        @keyframes bounce { 0% { height: 10px; } 100% { height: 120px; } }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="custom-loader"></div>
        <p style="margin-top: 20px; letter-spacing: 3px;">GETTING INFO...</p>
    </div>

    <div id="page1">
        <div class="container">
            <h2 style="margin-top:0; color: var(--primary);">FF LIKES & EMOTE BOT</h2>
            <select id="server">
                <option>Singapore</option>
                <option>India</option>
                <option>Bangladesh</option>
                <option>Brazil</option>
                <option>Taiwan</option>
                <option>Europe</option>
                
            </select>
            <div class="input-group">
                <input type="number" id="uid" placeholder="Enter UID">
            </div>
            <button class="submit-btn" onclick="validateAndSubmit()">Submit Details</button>
        </div>
    </div>

    <div id="page2">
        <h1 id="status-text">LEADER BOTZ CONNECTING...</h1>
        <div class="wave-container" id="wave-container"></div>
        
        <div id="apiModal" class="api-modal">
            <h2 style="color: #ff3e3e; margin-top:0;">Leader Botz Api error</h2>
            <p>Emote bot,FF likes Api are patched so currently stopped by leaderbotz.
             We'll updating the new api keys.</p>
            <button onclick="closeApiModal()" style="background:#ff3e3e; color:white; border:none; padding:10px 30px; cursor:pointer;">OK</button>
        </div>

        <div id="floating-container">
            <button class="float-btn" onclick="window.open('https://leaderbotzofficial.github.io/Website/', '_blank')">Website</button>
            <button class="float-btn" style="background:#0088cc; color:white;" onclick="window.open('https://t.me/+89agJ1vdIdY0MWQ1', '_blank')">Telegram</button>
        </div>
    </div>

    <div id="errorToast" class="toast">⚠️ WRONG UID!</div>

    <audio id="bgMusic" loop>
        <source src="FLAME RUNNER - AMOR NA PRAIA (ULTRA SLOWED REVERB)(MP3_160K).mp3" type="audio/mpeg">
    </audio>

    <script>
        function validateAndSubmit() {
            const uid = document.getElementById('uid').value;
            if (uid.length === 9 || uid.length === 10) {
                document.getElementById('loader-overlay').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('loader-overlay').style.display = 'none';
                    document.getElementById('page1').style.display = 'none';
                    startPage2();
                }, 3000);
            } else {
                const toast = document.getElementById('errorToast');
                toast.style.right = '20px';
                setTimeout(() => toast.style.right = '-350px', 3000);
            }
        }

        function startPage2() {
            document.getElementById('page2').style.display = 'flex';
            document.getElementById('bgMusic').play().catch(() => {});

            // Generate Waves
            const waveCont = document.getElementById('wave-container');
            for(let i=0; i<40; i++) {
                let bar = document.createElement('div');
                bar.className = 'wave-bar';
                bar.style.animationDelay = (i * 0.05) + 's';
                waveCont.appendChild(bar);
            }

            // API Error Trigger
            setTimeout(() => document.getElementById('apiModal').style.display = 'block', 4000);

            // Infinite Toggle: Show 2s, Hide 5s
            const floatBox = document.getElementById('floating-container');
            function toggleButtons() {
                floatBox.style.display = 'flex'; // Show
                setTimeout(() => {
                    floatBox.style.display = 'none'; // Hide after 2s
                    setTimeout(toggleButtons, 5000); // Wait 5s then restart
                }, 2000);
            }
            toggleButtons();
        }

        function closeApiModal() {
            document.getElementById('apiModal').style.display = 'none';
        }
    </script>
</body>
</html>
